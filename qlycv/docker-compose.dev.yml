version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: gis_db_dev
    environment:
      POSTGRES_DB: gis_database
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: YourPassword123
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gis_network_dev

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gis_redis_dev
    ports:
      - "6379:6379"
    networks:
      - gis_network_dev

  # Django Backend (Development mode with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gis_backend_dev
    environment:
      DEBUG: "true"
      SECRET_KEY: dev-insecure-key
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: gis_database
      DB_USER: admin
      DB_PASSWORD: YourPassword123
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - gis_network_dev
    command: python manage.py runserver 0.0.0.0:8000

  # Frontend (Development mode with Vite hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gis_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - gis_network_dev
    command: npm run dev

volumes:
  postgres_data_dev:

networks:
  gis_network_dev:
    driver: bridge
