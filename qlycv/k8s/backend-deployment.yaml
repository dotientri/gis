apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: DOCKERHUB_USERNAME/backend:TAG
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgres://myuser:mypassword@postgres:5432/mydb
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: mydb
        - name: DB_USER
          value: myuser
        - name: DB_PASSWORD
          value: mypassword
