version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: gis_db
    environment:
      POSTGRES_DB: ${DB_NAME:-gis_database}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-YourPassword123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=vi_VN.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gis_network
    restart: unless-stopped

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: gis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gis_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: gis_backend
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-gispark-backend-dev-key-change-me}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-gis_database}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-YourPassword123}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,gis_backend}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      EMAIL_HOST: ${EMAIL_HOST:-sandbox.smtp.mailtrap.io}
      EMAIL_PORT: ${EMAIL_PORT:-2525}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@qlycv.local}
      CONTACT_RECEIVER_EMAIL: ${CONTACT_RECEIVER_EMAIL:-dotientri0285@gmail.com}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./media:/app/media
      - ./static:/app/static
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gis_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./media:/app/media:ro
      - ./static:/app/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gis_network:
    driver: bridge
