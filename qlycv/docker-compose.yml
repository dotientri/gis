services:
  db:
    image: postgres:15-alpine
    container_name: gis_db
    environment:
      POSTGRES_DB: ${DB_NAME:-gis_database}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-YourPassword123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=vi_VN.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gis_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: ${BACKEND_IMAGE:-hiiamgay/qlycv-backend:latest}
    container_name: gis_backend
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-gispark-backend-dev-key-change-me}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-gis_database}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-YourPassword123}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,gis_backend}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      EMAIL_HOST: ${EMAIL_HOST:-sandbox.smtp.mailtrap.io}
      EMAIL_PORT: ${EMAIL_PORT:-2525}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@qlycv.local}
      CONTACT_RECEIVER_EMAIL: ${CONTACT_RECEIVER_EMAIL:-dotientri0285@gmail.com}
    volumes:
      - media_data:/app/media
      - static_data:/app/static
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: ${FRONTEND_IMAGE:-hiiamgay/qlycv-frontend:latest}
    container_name: gis_frontend
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/static:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  logs_data:
    driver: local

networks:
  gis_network:
    driver: bridge
