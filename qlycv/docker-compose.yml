services:
  db:
    image: postgis/postgis:17-3.5-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-gis_database}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-YourPassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup_full.sql:/docker-entrypoint-initdb.d/01-backup_full.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gis_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: ${BACKEND_IMAGE:-hiiamgay/qlycv-backend:latest}
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - media_data:/app/media
      - static_data:/app/static
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: ${FRONTEND_IMAGE:-hiiamgay/qlycv-frontend:latest}
    env_file: .env
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/static:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gis_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  logs_data:
    driver: local

networks:
  gis_network:
    driver: bridge
